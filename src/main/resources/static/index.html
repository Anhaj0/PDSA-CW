<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Deadline Priority Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center text-gray-800">Task Deadline Priority Tool</h1>

        <!-- Input Form -->
        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-semibold mb-4">Add New Task</h2>
            <form id="taskForm" class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <input type="text" id="title" placeholder="Title" required class="border p-2 rounded">
                <input type="text" id="description" placeholder="Description" class="border p-2 rounded">
                <input type="datetime-local" id="deadline" required class="border p-2 rounded">
                <input type="number" id="duration" placeholder="Est. Duration (hrs)" step="0.5"
                    class="border p-2 rounded" value="1.0">
                <button type="submit" class="bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition">Add
                    Task</button>
            </form>
        </div>

        <!-- Kanban Board -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

            <!-- Pending Tasks -->
            <div>
                <h2 class="text-xl font-semibold mb-4 text-blue-800 flex justify-between items-center">
                    Pending Tasks (Priority Queue)
                    <span id="pendingCount" class="bg-blue-200 text-blue-800 text-sm px-2 py-1 rounded-full">0</span>
                </h2>
                <div id="pendingList" class="space-y-4">
                    <!-- Tasks injected here -->
                </div>
            </div>

            <!-- Completed Tasks -->
            <div>
                <h2 class="text-xl font-semibold mb-4 text-green-800 flex justify-between items-center">
                    Completed Tasks
                    <span id="completedCount"
                        class="bg-green-200 text-green-800 text-sm px-2 py-1 rounded-full">0</span>
                </h2>
                <div id="completedList" class="space-y-4">
                    <!-- Tasks injected here -->
                </div>
            </div>

        </div>
        <!-- Reschedule Modal -->
        <div id="rescheduleModal"
            class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden flex justify-center items-center z-50">
            <div class="bg-white p-5 rounded-lg shadow-xl w-96">
                <h3 class="text-xl font-bold mb-4 text-gray-800">Reschedule Task</h3>
                <input type="hidden" id="rescheduleTaskId">
                <label class="block text-sm font-medium text-gray-700 mb-1">New Deadline</label>
                <input type="datetime-local" id="newDeadlineInput" class="border p-2 rounded w-full mb-6">
                <div class="flex justify-end space-x-2">
                    <button onclick="closeRescheduleModal()"
                        class="bg-gray-300 text-gray-800 px-4 py-2 rounded hover:bg-gray-400 transition">Cancel</button>
                    <button onclick="submitReschedule()"
                        class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">Save
                        Changes</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_URL = '/api/tasks';

        async function fetchTasks() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error('Network response was not ok');
                const data = await res.json();
                renderTasks(data.pending, data.completed);
            } catch (err) {
                console.error('Error fetching tasks:', err);
            }
        }

        function renderTasks(pending, completed) {
            const pendingList = document.getElementById('pendingList');
            const completedList = document.getElementById('completedList');

            document.getElementById('pendingCount').innerText = pending.length;
            document.getElementById('completedCount').innerText = completed.length;

            pendingList.innerHTML = '';
            completedList.innerHTML = '';

            pending.forEach((task, index) => {
                const date = new Date(task.deadline).toLocaleString();
                const isOverdue = new Date(task.deadline) < new Date();

                // Stress Score Logic
                const stressScore = task.stressScore.toFixed(2);
                const isHighStress = task.stressScore < 1.0;

                const urgentClass = index === 0 ? 'border-l-4 border-red-500 ring-2 ring-red-200 scale-102 transform' : 'border-l-4 border-blue-500';

                // Overdue or High Stress styling
                let bgClass = 'bg-white';
                if (isOverdue) bgClass = 'bg-red-50';
                else if (isHighStress) bgClass = 'bg-orange-50';

                const textClass = isOverdue ? 'text-red-700 font-bold' : (isHighStress ? 'text-orange-700 font-semibold' : 'text-gray-600');

                // Fix: Move Next Urgent badge to pop out of corner, preventing overlap
                // Fix: Move Stress Badge to a row below title to ensure separation
                const card = `
                    <div class="${bgClass} p-4 rounded shadow ${urgentClass} relative transition hover:shadow-lg mt-2 mx-1">
                        ${index === 0 ? '<span class="absolute -top-3 -right-2 bg-red-600 text-white text-xs px-2 py-1 rounded shadow-md font-bold uppercase tracking-wide z-10">Next Urgent</span>' : ''}
                        
                        <div class="mb-2 pr-4">
                            <h3 class="font-bold text-lg">${task.title}</h3>
                            <div class="inline-block mt-1 text-xs px-2 py-1 rounded ${isHighStress ? 'bg-red-100 text-red-800 font-bold' : 'bg-green-100 text-green-800'}">
                                Stress: ${stressScore}
                            </div>
                        </div>
                        
                        <p class="text-gray-700 text-sm mb-2">${task.description || ''}</p>
                        <p class="text-xs ${textClass} mb-1">Deadline: ${date} ${isOverdue ? '(OVERDUE)' : ''}</p>
                        <p class="text-xs text-gray-500 mb-3">Est. Duration: ${task.estimatedDurationHours} hours</p>
                        
                        <div class="flex space-x-2">
                            <button onclick="completeTask('${task.id}')" class="bg-green-500 text-white text-sm px-3 py-1 rounded hover:bg-green-600 transition flex-1">Mark Complete</button>
                            ${isOverdue || isHighStress ? `
                            <button onclick="openRescheduleModal('${task.id}', '${task.deadline}')" class="bg-yellow-500 text-white text-sm px-3 py-1 rounded hover:bg-yellow-600 transition flex-1">Fix Deadline</button>
                            ` : ''}
                        </div>
                    </div>
                `;
                pendingList.innerHTML += card;
            });

            completed.forEach(task => {
                const date = new Date(task.deadline).toLocaleString();
                const card = `
                    <div class="bg-gray-50 opacity-75 p-4 rounded shadow border-l-4 border-green-500 mx-1">
                        <h3 class="font-bold text-lg text-gray-500 line-through">${task.title}</h3>
                        <p class="text-gray-500 text-sm mb-2">${task.description || ''}</p>
                        <p class="text-xs text-gray-400">Deadline: ${date}</p>
                    </div>
                `;
                completedList.innerHTML += card;
            });
        }

        async function addTask(e) {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const deadline = document.getElementById('deadline').value;
            const duration = document.getElementById('duration').value;

            if (!deadline) {
                alert("Please select a deadline");
                return;
            }

            const task = {
                title,
                description,
                deadline,
                estimatedDurationHours: parseFloat(duration) || 1.0
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(task)
                });
                document.getElementById('taskForm').reset();
                document.getElementById('duration').value = "1.0"; // Reset to default
                fetchTasks();
            } catch (err) {
                console.error('Error adding task:', err);
            }
        }

        async function completeTask(id) {
            try {
                await fetch(`${API_URL}/${id}/complete`, { method: 'PUT' });
                fetchTasks();
            } catch (err) {
                console.error('Error completing task:', err);
            }
        }

        // Modal Logic
        function openRescheduleModal(id, currentDeadline) {
            document.getElementById('rescheduleTaskId').value = id;
            // Format datetime logic for input
            // The input expects "YYYY-MM-DDTHH:MM"
            // The tasks from API might be in ISO full string, let's just default to "now" or try to parse
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('newDeadlineInput').value = now.toISOString().slice(0, 16);

            document.getElementById('rescheduleModal').classList.remove('hidden');
        }

        function closeRescheduleModal() {
            document.getElementById('rescheduleModal').classList.add('hidden');
        }

        async function submitReschedule() {
            const id = document.getElementById('rescheduleTaskId').value;
            const newDate = document.getElementById('newDeadlineInput').value;

            if (newDate) {
                try {
                    await fetch(`${API_URL}/${id}/reschedule?newDeadline=${newDate}`, { method: 'PUT' });
                    closeRescheduleModal();
                    fetchTasks();
                } catch (err) {
                    console.error('Error rescheduling task:', err);
                    alert("Failed to reschedule");
                }
            } else {
                alert("Please select a new date");
            }
        }

        document.getElementById('taskForm').addEventListener('submit', addTask);

        // Initial Load
        fetchTasks();
    </script>
</body>

</html>
